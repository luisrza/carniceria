<!doctype html>

<meta name="theme-color" content="#0a0a0a" />
<title>Parrillero — LA CARNICERÍA</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: { extend: { fontFamily: {
      display: ['"Bebas Neue"', 'sans-serif'],
      sans: ['Inter', 'system-ui', 'sans-serif'],
      mono: ['"JetBrains Mono"', 'monospace'],
    }}},
  };

<style>
  :root { --ink:#0a0a0a; --paper:#fafaf7; --safe-bottom: env(safe-area-inset-bottom, 0px); }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--paper); color: var(--ink); }
  body { -webkit-font-smoothing: antialiased; }
  ::selection { background: #0a0a0a; color: #fafaf7; }

  .lang-btn.is-active { background: #0a0a0a; color: #fafaf7; }
  .tab-btn.is-active { background: #0a0a0a; color: #fafaf7; }

  .card-new {
    animation: card-in .35s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 0 0 0 rgba(245, 158, 11, .9);
  }
  @keyframes card-in {
    from { transform: translateY(-12px) scale(.97); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .flash {
    animation: flash 1s ease-out 2;
  }
  @keyframes flash {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
    50% { box-shadow: 0 0 0 8px rgba(245, 158, 11, .55); }
  }

  /* status accent stripes */
  .stripe-queued    { background: repeating-linear-gradient(45deg, #0a0a0a 0 6px, transparent 6px 14px); }
  .stripe-seasoning { background: repeating-linear-gradient(45deg, #d97706 0 6px, transparent 6px 14px); }
  .stripe-grilling  { background: repeating-linear-gradient(45deg, #b91c1c 0 6px, transparent 6px 14px); }
  .stripe-ready     { background: repeating-linear-gradient(45deg, #047857 0 6px, transparent 6px 14px); }

  .live-dot { position: relative; }
  .live-dot::after {
    content: ""; position: absolute; inset: 0;
    border-radius: 9999px; background: currentColor; opacity: .35;
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse { 0% { transform: scale(.8); opacity: .5; } 100% { transform: scale(2.2); opacity: 0; } }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* desktop kanban columns */
  @media (min-width: 1024px) {
    .kanban { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1rem; }
    .kanban-col { display: flex !important; }
    .mobile-only-tabs { display: none !important; }
  }
</style>
</head>
<body class="font-sans">

<!-- HEADER -->
<header class="sticky top-0 z-30 border-b-2 border-black bg-[var(--paper)]/95 backdrop-blur">

      </div>
    </div>
    <div class="flex items-center gap-2">
      <div class="hidden items-center gap-2 sm:flex">
        <span class="relative inline-flex h-2 w-2 text-emerald-600 live-dot">
          <span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-600"></span>
        </span>
        <span id="conn-status" class="font-mono text-[10px] uppercase tracking-widest text-neutral-700" data-i18n="parr.live"></span>
      </div>
      <button id="open-inventory" class="flex items-center gap-2 border-2 border-black bg-white px-3 min-h-[36px] text-[11px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2" y="3" width="12" height="11" rx="0.5"/><path d="M2 7h12M5 3v4M11 3v4"/></svg>
        <span data-i18n="parr.inventory"></span>
        <span id="inventory-badge" class="hidden border border-black bg-red-600 text-white px-1 font-mono text-[10px]">0</span>
      </button>
      <div class="flex border-2 border-black overflow-hidden">
        <button data-lang="es" class="lang-btn min-h-[36px] px-2.5 text-[11px] font-bold uppercase tracking-widest">ES</button>

</header>

<!-- INVENTORY MODAL -->
<div id="inv-scrim" class="fixed inset-0 z-40 hidden bg-black/50"></div>
<aside id="inv-modal" class="fixed right-0 top-0 z-50 hidden h-full w-full max-w-md flex-col border-l-2 border-black bg-[var(--paper)]">

  <div class="border-t-2 border-black bg-white p-3 text-center font-mono text-[10px] uppercase tracking-widest text-neutral-600" data-i18n="parr.inventory.hint"></div>
</aside>

<!-- STAT BAR -->
<section class="border-b-2 border-black bg-white">

<!-- MOBILE TABS (hidden on desktop) -->

  </div>

    <div class="mx-auto flex h-16 w-16 items-center justify-center border-2 border-black bg-white">

    <p class="mt-1 text-sm text-neutral-700" data-i18n="parr.empty.desc"></p>
  </div>
</main>

const t = (k) => I18N[lang][k] ?? k;

function applyI18n() {
  document.documentElement.lang = lang;
  $$('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  $$('.lang-btn').forEach(b => b.classList.toggle('is-active', b.dataset.lang === lang));
}
$$('.lang-btn').forEach(b => b.addEventListener('click', () => {
  lang = b.dataset.lang;
  localStorage.setItem('lang', lang);
  applyI18n();
  rerenderAll();
}));

    { id:'jm25', name:'Joya Manzana · 2.5L' },
    { id:'pcdc', name:'Diet Coke · 12-pack' },
    { id:'pcsp', name:'Sprite · 12-pack' },
    { id:'pccc', name:'Coca Cola · 12-pack' },
  ],
};

function statusIcon(status, size = 14) {
  const ico = {
    queued: `<svg viewBox="0 0 16 16" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square" style="flex-shrink:0;"><path d="M4 2h8M4 14h8M4.5 2.5v3l3.5 2.5 3.5-2.5v-3M4.5 13.5v-3l3.5-2.5 3.5 2.5v3"/></svg>`,
    seasoning: `<svg viewBox="0 0 16 16" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="square" style="flex-shrink:0;"><rect x="5" y="5" width="6" height="9"/><path d="M5 5V3h6v2"/><circle cx="7" cy="3.6" r="0.5" fill="currentColor" stroke="none"/><circle cx="9" cy="3.6" r="0.5" fill="currentColor" stroke="none"/><circle cx="8" cy="2" r="0.5" fill="currentColor" stroke="none"/></svg>`,
    grilling: `<svg viewBox="0 0 16 16" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" style="flex-shrink:0;"><path d="M8 1.5c1.6 2.5 3 3.5 3 6.5a3 3 0 01-6 0c0-1.5.8-2.3 1.5-3 0 1.3 1.5 1.3 1.5-3.5z"/></svg>`,
    ready: `<svg viewBox="0 0 16 16" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="square" style="flex-shrink:0;"><path d="M3 8l3.5 3.5L13 5"/></svg>`,
  };
  return ico[status] || '';
}

function injectStatusIcons() {
  document.querySelectorAll('[data-status-ico]').forEach(el => {
    el.innerHTML = statusIcon(el.dataset.statusIco, 16);
  });
}

function timeAgo(ts) {
  const m = Math.floor(Math.max(0, Date.now() - ts) / 60000);
  if (m < 1) return t('card.just');
  return `${m} ${t('card.min')}`;
}
function timeStr(ts) {
  return new Date(ts).toLocaleTimeString(lang === 'es' ? 'es-MX' : 'en-US', { hour: '2-digit', minute: '2-digit' });
}
function donenessColor(id) {
  const map = { azul:'#5b1212', rojo:'#7a1a1a', medio:'#a23030', tres:'#b9614a', cuatro:'#9c6242', bien:'#5e3a23' };
  return map[id] || '#000';
}

function summarizeItems(items) {
  // counts: package items vs extras
  const pkgs = items.filter(i => i.type === 'package');
  const simples = items.filter(i => i.type === 'simple');
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  return { pkgs, simples, totalQty };
}

function buildCard(o) {
  const { pkgs, simples, totalQty } = summarizeItems(o.items);
  const donenessChips = [...new Set(pkgs.filter(p => p.doneness).map(p => p.doneness))]
    .map(d => `<span class="inline-flex items-center gap-1 border border-black px-2 py-0.5 text-[10px] font-bold uppercase">
      <span class="inline-block h-2 w-2 rounded-full" style="background:${donenessColor(d)}"></span>${t('don.' + d)}
    </span>`).join('');

  const allNotes = [...new Set(pkgs.flatMap(p => p.notes || []))].map(k => {
    const labels = { 'notes.0':'Sin sal/No salt','notes.1':'Extra término/Extra cooked','notes.2':'Cortar en tiras/Sliced','notes.3':'Sin grasa/No fat','notes.4':'Bien sellado/Well seared','notes.5':'Servir aparte/On the side' };
    const txt = labels[k] || k;
    return `<span class="border border-black px-2 py-0.5 text-[10px] font-bold uppercase">${txt}</span>`;
  }).join(' ');

  const itemRows = [
    ...pkgs.map(p => `
      <li class="flex items-baseline justify-between gap-2 border-b border-dashed border-neutral-300 pb-1">
        <span class="font-display text-base leading-tight">${p.name.toUpperCase()}${p.serves ? ` · ${p.serves}` : ''}</span>
        <span class="font-mono text-xs shrink-0">${t('card.qty')}${p.qty}</span>
      </li>
    `),
    ...simples.map(s => `
      <li class="flex items-baseline justify-between gap-2 text-sm">
        <span class="font-mono text-[11px] text-neutral-600">${s.name}${s.sub ? ' · ' + s.sub : ''}</span>
        <span class="font-mono text-xs shrink-0">${t('card.qty')}${s.qty}</span>
      </li>
    `),
  ].join('');

  const isQueued    = o.status === 'queued';
  const isSeasoning = o.status === 'seasoning';
  const isGrilling  = o.status === 'grilling';
  const isReady     = o.status === 'ready';

  const buttonText = t('btn.advance.' + o.status);
  const buttonAction = isReady ? 'delete' : 'advance';
  const buttonClass = isReady
    ? 'bg-emerald-600 text-white border-emerald-600'
    : isGrilling
      ? 'bg-amber-300 text-black border-black'
      : 'bg-black text-white border-black';

  const customerName = (o.customerName || '').trim();
  return `
    <article data-order-id="${o.id}" class="card-new border-2 border-black bg-white overflow-hidden">
      <div class="border-b-2 border-black px-3 py-2">
        ${customerName ? `<div class="font-display text-2xl leading-tight uppercase tracking-tight">${customerName}</div>` : ''}
        <div class="mt-0.5 flex items-center justify-between gap-2">
          <div class="font-mono text-[10px] uppercase tracking-widest text-neutral-500">
            ${o.id} · ${timeStr(o.created_at)} · ${timeAgo(o.created_at)}
          </div>
          <div class="text-right">
            <span class="font-display text-base leading-none">${fmt(o.total)}</span>
            <span class="font-mono text-[10px] uppercase tracking-widest text-neutral-500 ml-1">${totalQty}${totalQty === 1 ? t('card.item').charAt(0) : t('card.items').charAt(0)}</span>
          </div>
        </div>
      </div>

      <div class="px-3 py-2">
        <ul class="space-y-1">${itemRows}</ul>
      </div>

      ${donenessChips ? `
        <div class="border-t border-dashed border-neutral-300 px-3 py-2">
          <div class="font-mono text-[9px] uppercase tracking-widest text-neutral-500 mb-1">${t('card.donenessLabel')}</div>
          <div class="flex flex-wrap gap-1">${donenessChips}</div>
        </div>
      ` : ''}

      ${allNotes ? `
        <div class="border-t border-dashed border-neutral-300 px-3 py-2">
          <div class="font-mono text-[9px] uppercase tracking-widest text-neutral-500 mb-1">${t('card.notes')}</div>
          <div class="flex flex-wrap gap-1">${allNotes}</div>
        </div>
      ` : ''}

      <div class="flex items-stretch gap-1 border-t-2 border-black p-2">
        ${o.status !== 'queued' ? `
          <button data-action="back" data-id="${o.id}" class="border-2 border-black bg-white px-3 py-3 text-[11px] font-bold uppercase tracking-widest">
            ←
          </button>
        ` : ''}
        <button data-action="${buttonAction}" data-id="${o.id}" class="flex-1 border-2 ${buttonClass} px-3 py-3 text-xs font-bold uppercase tracking-widest">
          ${buttonText}
        </button>
      </div>
    </article>
  `;
}

function rerenderAll() {
  applyI18n();
  // counts
  STATUSES.forEach(s => {
    const list = [...ordersById.values()].filter(o => o.status === s).sort((a,b) => a.created_at - b.created_at);
    const colList = document.querySelector(`[data-col="${s}"] [data-col-list]`);
    const colCount = document.querySelector(`[data-col="${s}"] [data-col-count]`);
    if (colList) colList.innerHTML = list.map(buildCard).join('');
    if (colCount) colCount.textContent = list.length;
    const stat = document.getElementById('count-' + s);
    if (stat) stat.textContent = list.length;
  });
  // mobile tab counts
  STATUSES.forEach((s, i) => {
    const tab = document.querySelector(`[data-tab="${s}"]`);
    if (tab) {
      const cnt = tab.querySelector('.tab-count');
      if (cnt) cnt.textContent = [...ordersById.values()].filter(o => o.status === s).length;
    }
  });

  // empty state
  $('#empty-state').classList.toggle('hidden', ordersById.size > 0);

  // bind buttons
  $$('[data-action]').forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.addEventListener('click', () => handleAction(btn.dataset.action, btn.dataset.id));
  });

  // mobile tab visibility
  if (window.innerWidth < 1024) {
    document.querySelectorAll('[data-col]').forEach(c => {
      c.classList.toggle('hidden', c.dataset.col !== activeTab);
      c.classList.toggle('flex', c.dataset.col === activeTab);
    });
  }
}

async function handleAction(action, id) {
  const order = ordersById.get(id);
  if (!order) return;
  try {
    if (action === 'advance') {
      const r = await fetch(`/api/orders/${id}/advance`, { method: 'POST' });
      if (!r.ok) throw new Error();
      const o = await r.json();
      ordersById.set(o.id, o);
      rerenderAll();
      flashCard(id);
      toast(t('toast.advanced'));
    } else if (action === 'back') {
      const idx = STATUSES.indexOf(order.status);
      if (idx <= 0) return;
      const prev = STATUSES[idx - 1];
      const r = await fetch(`/api/orders/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: prev }),
      });
      if (!r.ok) throw new Error();
      const o = await r.json();
      ordersById.set(o.id, o);
      rerenderAll();
    } else if (action === 'delete') {
      const r = await fetch(`/api/orders/${id}`, { method: 'DELETE' });
      if (!r.ok) throw new Error();
      ordersById.delete(id);
      rerenderAll();
      toast(t('toast.delivered'));
    }
  } catch (e) {
    toast(t('toast.error'));
  }
}

function flashCard(id) {
  const el = document.querySelector(`[data-order-id="${id}"]`);
  if (el) {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 2200);
  }
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.add('hidden'), 1800);
}

// Tabs (mobile)
$$('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    $$('.tab-btn').forEach(b => b.classList.toggle('is-active', b === btn));
    rerenderAll();
  });
});

// SSE subscription
function subscribe() {
  const es = new EventSource('/api/stream');
  es.addEventListener('order:new', (e) => {
    const o = JSON.parse(e.data);
    ordersById.set(o.id, o);
    rerenderAll();
    flashCard(o.id);
    toast(t('toast.newOrder'));
    chime('new');
  });
  es.addEventListener('order:update', (e) => {
    const o = JSON.parse(e.data);
    ordersById.set(o.id, o);
    rerenderAll();
  });
  es.addEventListener('order:delete', (e) => {
    const { id } = JSON.parse(e.data);
    ordersById.delete(id);
    rerenderAll();
  });
  es.addEventListener('items:soldout', (e) => {
    const data = JSON.parse(e.data);
    soldOutSet.clear();
    (data.items || []).forEach(id => soldOutSet.add(id));
    renderInventory();
    refreshInventoryBadge();
  });
  es.onerror = () => {
    $('#conn-status').textContent = (lang === 'es' ? 'Reconectando…' : 'Reconnecting…');
    setTimeout(() => { $('#conn-status').textContent = t('parr.live'); }, 3000);
  };
}

function chime(kind = 'new') {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = kind === 'new' ? [660, 880] : [880];
    freqs.forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square';
      o.frequency.value = freq;
      g.gain.value = 0;
      o.connect(g); g.connect(ctx.destination);
      const t0 = ctx.currentTime + i * 0.1;
      g.gain.linearRampToValueAtTime(0.12, t0 + 0.02);
      g.gain.linearRampToValueAtTime(0, t0 + 0.2);
      o.start(t0); o.stop(t0 + 0.25);
    });
  } catch {}
}

async function loadOrders() {
  try {
    const r = await fetch('/api/orders');
    if (!r.ok) throw new Error();
    const list = await r.json();
    list.forEach(o => ordersById.set(o.id, o));
    rerenderAll();
  } catch (e) {
    toast(t('toast.error'));
  }
}

// ============== INVENTORY (sold-out toggles) ==============
async function loadSoldOut() {
  try {
    const r = await fetch('/api/sold-out');
    if (!r.ok) return;
    const data = await r.json();
    soldOutSet.clear();
    (data.items || []).forEach(id => soldOutSet.add(id));
    renderInventory();
    refreshInventoryBadge();
  } catch {}
}

function refreshInventoryBadge() {
  const badge = document.getElementById('inventory-badge');
  if (!badge) return;
  if (soldOutSet.size === 0) {
    badge.classList.add('hidden');
  } else {
    badge.classList.remove('hidden');
    badge.textContent = soldOutSet.size;
  }
}

async function toggleSoldOut(id, soldOut) {
  try {
    const r = await fetch('/api/sold-out', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, soldOut }),
    });
    if (!r.ok) throw new Error();
    const data = await r.json();
    soldOutSet.clear();
    (data.items || []).forEach(x => soldOutSet.add(x));
    renderInventory();
    refreshInventoryBadge();
    toast(soldOut ? `${id}: ${t('parr.inv.soldout')}` : `${id}: ${t('parr.inv.available')}`);
  } catch (e) {
    toast(t('toast.error'));
  }
}

function inventorySection(label, items) {
  const rows = items.map(it => {
    const sold = soldOutSet.has(it.id);
    return `
      <button data-inv-toggle data-id="${it.id}" data-sold="${sold ? '0' : '1'}"
        class="flex w-full items-center justify-between gap-2 border-2 ${sold ? 'border-red-600 bg-red-50' : 'border-black bg-white'} px-3 py-3 text-left transition hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[3px_3px_0_0_#0a0a0a]">
        <div class="flex items-center gap-2">
          <span class="inline-block h-3 w-3 ${sold ? 'bg-red-600' : 'bg-emerald-500'} border border-black"></span>
          <span class="font-bold text-sm ${sold ? 'line-through text-neutral-500' : ''}">${it.name}</span>
        </div>
        <span class="font-mono text-[10px] uppercase tracking-widest ${sold ? 'text-red-600' : 'text-emerald-700'}">
          ${sold ? t('parr.inv.soldout') : t('parr.inv.available')}
        </span>
      </button>
    `;
  }).join('');
  return `
    <div>
      <div class="font-mono text-[10px] uppercase tracking-widest text-neutral-500 mb-1.5">${label}</div>
      <div class="grid gap-1.5">${rows}</div>
    </div>
  `;
}

function renderInventory() {
  const list = document.getElementById('inv-list');
  if (!list) return;
  list.innerHTML = [
    inventorySection(t('parr.inv.section.packages'), MENU.packages),
    inventorySection(t('parr.inv.section.grill'),    MENU.grill),
    inventorySection(t('parr.inv.section.sauces'),   MENU.sauces),
    inventorySection(t('parr.inv.section.drinks'),   MENU.drinks),
  ].join('');
  list.querySelectorAll('[data-inv-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      toggleSoldOut(btn.dataset.id, btn.dataset.sold === '1');
    });
  });
}

function openInventory() {
  document.getElementById('inv-modal').classList.remove('hidden');
  document.getElementById('inv-modal').classList.add('flex');
  document.getElementById('inv-scrim').classList.remove('hidden');
}
function closeInventory() {
  document.getElementById('inv-modal').classList.add('hidden');
  document.getElementById('inv-modal').classList.remove('flex');
  document.getElementById('inv-scrim').classList.add('hidden');
}
document.getElementById('open-inventory').addEventListener('click', openInventory);
document.getElementById('close-inventory').addEventListener('click', closeInventory);
document.getElementById('inv-scrim').addEventListener('click', closeInventory);

// initial
applyI18n();
injectStatusIcons();
loadOrders();
loadSoldOut();
subscribe();
window.addEventListener('resize', rerenderAll);

// auto-refresh time labels every 30s
setInterval(rerenderAll, 30000);
</script>
</body>
</html>
